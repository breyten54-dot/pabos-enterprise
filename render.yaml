# PABOS Enterprise — Render staging blueprint (Claude, 2026-07-16)
# Apply: Render dashboard → New → Blueprint → select the pabos-enterprise repo.
# Free tier: backend sleeps after idle (first request ~30s wake) — fine for a demo.
# Stubs stay stubbed by design: Redis/MinIO/Ollama are NOT provisioned; the app's
# graceful fallbacks + the SIMULATED badge (K-2 Part 2) cover them.

databases:
  - name: pabos-staging-db
    plan: free
    databaseName: pabos_staging
    user: pabos

services:
  - type: web
    name: pabos-staging-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    # seed is idempotent (upserts) — safe on every boot; creates admin@praeto.local / Admin1234!
    startCommand: npx prisma migrate deploy && npx prisma db seed && npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pabos-staging-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # keep devDependencies at build/runtime (nest CLI for build, ts-node for prisma db seed)
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      - key: CORS_ORIGIN
        value: https://pabos-staging.onrender.com
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: TOTP_ISSUER
        value: PABOS

  - type: web
    name: pabos-staging
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://pabos-staging-api.onrender.com/api/v1
