version: "3.9"

# PABOS Enterprise — development infrastructure only.
# Backend and frontend run on the host (or in separate dev commands).
# Compose provides PostgreSQL, Redis, MinIO, Ollama, and Nginx.

services:
  postgres:
    image: postgres:16-alpine
    container_name: pabos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pabos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-pabos_dev}
    ports:
      - "5432:5432"
    volumes:
      - pabos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pabos} -d ${POSTGRES_DB:-pabos_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pabos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pabos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pabos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pabos_minio_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: pabos-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - pabos_ollama_models:/root/.ollama
    # CPU mode by default. See docs/LOCAL_AI.md for GPU passthrough notes.

  nginx:
    image: nginx:alpine
    container_name: pabos-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "9001:9001"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
      - minio
      - ollama

volumes:
  pabos_postgres_data:
  pabos_redis_data:
  pabos_minio_data:
  pabos_ollama_models:
