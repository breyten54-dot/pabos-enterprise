events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  # Upstream hosts are expected to run on the Docker host.
  # host.docker.internal resolves to the host machine from inside the container.

  server {
    listen 80;
    server_name localhost;

    # Proxy API requests to the backend dev server (NestJS).
    # The backend uses /api/v1 as its global prefix.
    location /api/v1/ {
      proxy_pass http://host.docker.internal:4000/api/v1/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger docs at /api/docs
    location /api/docs {
      proxy_pass http://host.docker.internal:4000/api/docs;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all other requests to the Vite dev server.
    location / {
      proxy_pass http://host.docker.internal:5173/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support for Vite HMR.
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # Optional: expose MinIO Console on port 9001.
  server {
    listen 9001;
    server_name localhost;

    location / {
      proxy_pass http://host.docker.internal:9001/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Port $server_port;
    }
  }
}
